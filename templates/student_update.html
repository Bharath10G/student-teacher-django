{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Update Student</title>
     <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <h1>Update Student</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Name:</label>
        <input type="text" name="name" value="{{ obj.name }}"><br><br>

        <label>Age:</label>
        <input type="number" name="age" value="{{ obj.age }}"><br><br>

        <label>Gender:</label>
        <input type="text" name="gender" value="{{ obj.gender }}"><br><br>

        <label>Email:</label>
        <input type="email" name="email" value="{{ obj.email }}"><br><br>

        <label>Phone:</label>
        <input type="text" name="phone" value="{{ obj.phone }}"><br><br>

        <label>Course:</label>
        <input type="text" name="course" value="{{ obj.course }}"><br><br>

        <label>Address:</label><br>
        <textarea name="address" rows="4" cols="30">{{ obj.address }}</textarea><br><br>

        <input type="submit" value="Update Student">
    </form>

    <br>

    <a href="{% url 'student_all' %}">Back</a>

</body>
</html>
